<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luca Agency Dashboard</title>
</head>

<body>

<div class="top-actions"></div>
<div id="tabList"></div>
<div id="content"></div>

<script>

const STORAGE_KEY = 'luca-agency-dashboard-v1';

const TAB_META = {
  leads: { label: 'Leads' },
  editors: { label: 'Editores' },
  clients: { label: 'Clientes' },
  videos: { label: 'Recuento' }
};

let state = {
  ui: { activeTab: 'leads' }
};

const contentEl = document.getElementById('content');
const tabListEl = document.getElementById('tabList');

function renderTabs() {
  tabListEl.innerHTML = '';
  Object.entries(TAB_META).forEach(([key, tab]) => {
    const btn = document.createElement('button');
    btn.textContent = tab.label;
    btn.onclick = () => {
      state.ui.activeTab = key;
      render();
    };
    tabListEl.appendChild(btn);
  });
}

function render() {
  contentEl.innerHTML = `<h2>${state.ui.activeTab}</h2>`;
}

// ================= GOOGLE SHEETS =================
async function importFromGoogleSheets() {
  const url = prompt('Pegá el CSV');
  if (!url) return;

  const res = await fetch(url);
  const text = await res.text();

  const rows = text.split('\n').map(r => r.split(','));
  console.log(rows);
}

// botón
const importBtn = document.createElement('button');
importBtn.textContent = 'Importar';
importBtn.onclick = importFromGoogleSheets;

document.querySelector('.top-actions').appendChild(importBtn);


// 🔥 FIX FINAL (ESTO ERA LO QUE FALTABA)
document.addEventListener("DOMContentLoaded", () => {
  renderTabs();
  render();
});

</script>

</body>
</html>
