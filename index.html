<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Luca Agency Dashboard</title>
<style>
body { font-family: Arial; background:#0f1f1d; color:white; }
button { margin:5px; padding:10px; border:none; border-radius:10px; cursor:pointer; }
.top-actions { margin-bottom:20px; }
</style>
</head>

<body>

<h1>Luca Agency Dashboard</h1>

<div class="top-actions">
  <button onclick="exportJSON()">Exportar JSON</button>
  <button onclick="importJSON()">Importar JSON</button>
  <button onclick="importFromGoogleSheets()">Importar Google Sheets</button>
</div>

<h2>Leads</h2>
<div id="leads"></div>

<script>

// ================== STATE ==================
const state = {
  leads: {
    months: {
      marzo: []
    }
  }
};

// ================== UTILS ==================
function uid() {
  return Date.now() + Math.random();
}

function normalizeYesNo(val) {
  if (!val) return 'no';
  val = val.toLowerCase();
  if (val.includes('si') || val.includes('yes')) return 'yes';
  return 'no';
}

// ================== RENDER ==================
function render() {
  const container = document.getElementById("leads");
  container.innerHTML = "";

  Object.keys(state.leads.months).forEach(month => {
    const leads = state.leads.months[month];

    leads.forEach(l => {
      const div = document.createElement("div");
      div.innerHTML = `
        <p><b>${l.name}</b> - ${l.interested}</p>
      `;
      container.appendChild(div);
    });
  });
}

// ================== IMPORT GOOGLE SHEETS ==================
async function importFromGoogleSheets() {
  const url = prompt("Pegá el link CSV del Google Sheet");

  if (!url) return;

  try {
    const res = await fetch(url);
    const text = await res.text();

    const rows = text.split("\n").map(r => r.split(","));
    rows.shift(); // headers

    rows.forEach(r => {
      const name = r[0] || "";
      const replied = r[1] || "";
      const interested = r[2] || "";
      const callBooked = r[3] || "";
      const closed = r[4] || "";

      state.leads.months.marzo.push({
        id: uid(),
        name: name.trim(),
        replied: normalizeYesNo(replied),
        interested: normalizeYesNo(interested),
        callBooked: normalizeYesNo(callBooked),
        closed: normalizeYesNo(closed),
        objection: "",
        chatLink: "",
        reason: ""
      });
    });

    render();
    alert("Leads importados");

  } catch (e) {
    alert("Error importando");
  }
}

// ================== EXPORT / IMPORT ==================
function exportJSON() {
  const dataStr = JSON.stringify(state);
  const blob = new Blob([dataStr], {type: "application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "data.json";
  a.click();
}

function importJSON() {
  alert("Función import JSON (opcional)");
}

// ================== INIT ==================
render();

</script>

</body>
</html>
