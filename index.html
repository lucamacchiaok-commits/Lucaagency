<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luca Agency Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0c1b1a;
  color: white;
}

header {
  padding: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

h1 {
  margin: 0;
}

.top-actions button {
  margin-left: 10px;
  padding: 10px 15px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
}

.container {
  display: flex;
}

.sidebar {
  width: 250px;
  padding: 20px;
}

.sidebar button {
  display: block;
  width: 100%;
  margin-bottom: 10px;
  padding: 12px;
  background: #132826;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 10px;
}

.sidebar button.active {
  background: #2b6f6a;
}

.content {
  flex: 1;
  padding: 20px;
}
.card {
  background: #132826;
  padding: 20px;
  border-radius: 15px;
}
</style>

</head>

<body>

<header>
  <h1>Luca Agency Dashboard</h1>
  <div class="top-actions">
    <button onclick="exportJSON()">Exportar JSON</button>
    <button onclick="importJSON()">Importar JSON</button>
  </div>
</header>

<div class="container">
  <div class="sidebar" id="tabs"></div>
  <div class="content" id="content"></div>
</div>

<script>

const state = {
  active: 'leads'
};

const tabs = ['leads', 'editores', 'clientes', 'recuento'];

function renderTabs() {
  const container = document.getElementById('tabs');
  container.innerHTML = '';

  tabs.forEach(tab => {
    const btn = document.createElement('button');
    btn.textContent = tab;

    if (state.active === tab) {
      btn.classList.add('active');
    }

    btn.onclick = () => {
      state.active = tab;
      render();
    };

    container.appendChild(btn);
  });
}

function renderContent() {
  const content = document.getElementById('content');

  if (state.active === 'leads') {
    content.innerHTML = `
      <div class="card">
        <h2>Leads</h2>
        <p>Acá van los leads...</p>
      </div>
    `;
  }

  if (state.active === 'editores') {
    content.innerHTML = `
      <div class="card">
        <h2>Editores</h2>
      </div>
    `;
  }

  if (state.active === 'clientes') {
    content.innerHTML = `
      <div class="card">
        <h2>Clientes</h2>
      </div>
    `;
  }

  if (state.active === 'recuento') {
    content.innerHTML = `
      <div class="card">
        <h2>Recuento de videos</h2>
      </div>
    `;
  }
}

function render() {
  renderTabs();
  renderContent();
}

// ================= FUNCIONES =================

function exportJSON() {
  alert('Exportar JSON');
}

function importJSON() {
  alert('Importar JSON');
}

// ================= INIT =================

document.addEventListener("DOMContentLoaded", () => {
  render();
});

</script>

</body>
</html>
